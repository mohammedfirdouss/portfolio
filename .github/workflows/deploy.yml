name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1

      - run: bun install

      - name: Remove legacy Worker (if exists)
        run: |
          echo "Attempting to delete legacy Worker 'portfolio'..."
          echo '{"name":"portfolio"}' > /tmp/worker-cleanup.json
          bunx wrangler delete --name portfolio --force --config /tmp/worker-cleanup.json || echo "No legacy Worker found or already deleted"
          rm -f /tmp/worker-cleanup.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Configure custom domain on Pages project
        run: |
          # Step 1: Add custom domain to Pages project
          echo "Adding custom domain to Pages project..."
          DOMAIN_RESP=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/portfolio/domains" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"mohammedfirdous.me"}')
          echo "Pages domain response: $DOMAIN_RESP"

          # Step 2: Get zone ID for mohammedfirdous.me
          echo "Looking up zone ID..."
          ZONE_RESP=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=mohammedfirdous.me" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          ZONE_ID=$(echo "$ZONE_RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['result'][0]['id'] if r.get('result') else '')" 2>/dev/null)
          echo "Zone ID: $ZONE_ID"

          if [ -n "$ZONE_ID" ]; then
            # Step 3: Check existing DNS records for root domain
            echo "Checking existing DNS records..."
            DNS_LIST=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=mohammedfirdous.me&type=CNAME" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
            RECORD_ID=$(echo "$DNS_LIST" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['result'][0]['id'] if r.get('result') else '')" 2>/dev/null)
            echo "Existing CNAME record ID: $RECORD_ID"

            if [ -n "$RECORD_ID" ]; then
              # Update existing CNAME to point to Pages
              echo "Updating CNAME to point to portfolio-cfa.pages.dev..."
              curl -s -X PUT \
                "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID" \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"type":"CNAME","name":"mohammedfirdous.me","content":"portfolio-cfa.pages.dev","proxied":true}'
            else
              # Create new CNAME record
              echo "Creating CNAME record pointing to portfolio-cfa.pages.dev..."
              curl -s -X POST \
                "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"type":"CNAME","name":"mohammedfirdous.me","content":"portfolio-cfa.pages.dev","proxied":true}'
            fi
          else
            echo "Could not find zone for mohammedfirdous.me - manual DNS setup required"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create Pages project (if not exists)
        run: bunx wrangler pages project create portfolio --production-branch=master || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
